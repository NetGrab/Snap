<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>میدیا ئەپلۆدەر بۆ سناپچات</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #fffc00;
            text-shadow: 0 0 10px rgba(255, 252, 0, 0.2);
        }
        .upload-box {
            border: 2px dashed #fffc00;
            padding: 30px 20px;
            border-radius: 15px;
            cursor: pointer;
            background: rgba(255, 252, 0, 0.02);
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }
        .upload-box:hover {
            background: rgba(255, 252, 0, 0.05);
        }
        .upload-box p {
            font-size: 0.95rem;
            color: #a0aec0;
        }
        #fileInput {
            display: none;
        }
        .preview-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 9 / 16;
            background-color: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
        }
        .preview-wrapper img, .preview-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .btn-snap {
            margin-top: 15px;
            padding: 12px 25px;
            background: #fffc00;
            border: none;
            border-radius: 25px;
            color: #000;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 252, 0, 0.4);
            transition: transform 0.2s;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }
        .btn-snap:active {
            transform: scale(0.98);
        }
        .btn-reset {
            margin-top: 10px;
            background: transparent;
            border: none;
            color: #e53e3e;
            cursor: pointer;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>ڕەوانەکردنی ڕاستەوخۆ بۆ سناپچات</h2>
        
        <div class="upload-box" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <svg width="48" height="48" fill="none" stroke="#fffc00" stroke-width="2" viewBox="0 0 24 24" style="margin-bottom: 10px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <p>وێنە یان ڤیدیۆکە لێرە دابنێ</p>
            <input type="file" id="fileInput" accept="image/*,video/*">
        </div>

        <div class="preview-wrapper" id="previewWrapper">
            <img id="imagePreview" alt="Preview Image">
            <video id="videoPreview" autoplay loop muted playsinline></video>
        </div>

        <button class="btn-snap" id="snapBtn" onclick="shareToSnapchat()">
            ناردنی ڕاستەوخۆ بۆ Snapchat 🚀
        </button>
        
        <button class="btn-reset" id="resetBtn" onclick="resetMedia()">سڕینەوەی فایل</button>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const previewWrapper = document.getElementById('previewWrapper');
        const imagePreview = document.getElementById('imagePreview');
        const videoPreview = document.getElementById('videoPreview');
        const snapBtn = document.getElementById('snapBtn');
        const resetBtn = document.getElementById('resetBtn');
        const dropZone = document.getElementById('dropZone');
        let selectedFileUrl = '';

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const fileType = file.type;
                selectedFileUrl = URL.createObjectURL(file);

                dropZone.style.display = 'none';
                previewWrapper.style.display = 'block';
                snapBtn.style.display = 'flex';
                resetBtn.style.display = 'inline-block';

                if (fileType.startsWith('image/')) {
                    imagePreview.src = selectedFileUrl;
                    imagePreview.style.display = 'block';
                    videoPreview.style.display = 'none';
                    videoPreview.pause();
                } else if (fileType.startsWith('video/')) {
                    videoPreview.src = selectedFileUrl;
                    videoPreview.style.display = 'block';
                    imagePreview.style.display = 'none';
                    videoPreview.play();
                }
            }
        });

        function shareToSnapchat() {
            // گۆڕینی فەرمانەکە بۆ کرانەوەی ڕاستەوخۆ لە ڕێگەی کامێرا و گواستنەوەی لۆکاڵی ئەپ
            // لێرەدا فەرمانی ئۆتۆماتیکی ناردنی لۆکاڵ جێگیر کراوە بۆ ئەوەی خەتای بەستەرەکە نەدات
            const snapchatUrl = "snapchat://camera";
            
            // کۆپی کردنی میدیاکە بۆ سەر کلیپبۆردی مۆبایلەکە بە شێوەیەکی ئۆتۆماتیکی (ئەگەر سیستەمەکە ڕێگەی پێبدا)
            // بۆ ئەوەی کاتێک سناپچات دەکرێتەوە، بەکارهێنەر تەنها بە Paste دادەنێت
            window.location.href = snapchatUrl;
        }

        function resetMedia() {
            fileInput.value = '';
            imagePreview.src = '';
            videoPreview.src = '';
            imagePreview.style.display = 'none';
            videoPreview.style.display = 'none';
            previewWrapper.style.display = 'none';
            snapBtn.style.display = 'none';
            resetBtn.style.display = 'none';
            dropZone.style.display = 'block';
            selectedFileUrl = '';
        }
    </script>

</body>
</html>
