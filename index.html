<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شەیرکردن</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            margin-top: 50px; 
            background-color: #f4f4f4; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            display: inline-block; 
            width: 80%;
            max-width: 400px;
        }
        input[type="file"] {
            margin-bottom: 20px;
            font-size: 16px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        /* دوگمەکە ئێستا هەمیشە دیارە */
        #shareButton { 
            display: block; 
            margin: 20px auto 0; 
            padding: 15px 30px; 
            background: #FFFC00; 
            color: black;
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 18px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>وێنەکە هەڵبژێرە</h2>
        
        <input type="file" id="imageInput" accept="image/*">
        
        <button id="shareButton">شەیرکردن بۆ سناپچات 👻</button>
    </div>

    <script>
        const input = document.getElementById('imageInput');
        const shareButton = document.getElementById('shareButton');

        shareButton.addEventListener('click', async () => {
            // پشکنین دەکات بزانێت وێنەت هەڵبژاردووە یان نا
            if (input.files.length === 0) {
                alert("تکایە سەرەتا وێنەیەک هەڵبژێرە لە قۆپچەی سەرووتر!");
                return;
            }

            const fileToShare = input.files[0];
            const filesArray = [new File([fileToShare], "snap.jpg", { type: fileToShare.type })];

            if (navigator.canShare && navigator.canShare({ files: filesArray })) {
                try {
                    await navigator.share({
                        files: filesArray,
                        title: 'Snapchat',
                        text: 'وێنەیەکی نوێ'
                    });
                } catch (err) {
                    console.log('شەیرکردنەکە سەرکەوتوو نەبوو:', err);
                }
            } else {
                alert("مۆبایلەکەت یان براوزەرەکەت پشتگیری ئەم جۆرە شەیرکردنە ناکات.");
            }
        });
    </script>
</body>
</html>
